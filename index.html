.lb{color:#0f0;border:2px solid #0f07;padding:14px 36px;cursor:pointer;letter-spacing:4px;font-size:clamp(12px,3.5vw,16px);background:transparent;font-family:inherit;transition:all .18s;min-width:200px;}

.lb:hover{background:#0f02;border-color:#0f0;}

.lb.mb{border-color:#f806;color:#f80;}

.lb.mb:hover{background:#f802;border-color:#f80;}

#lnl{color:#0f02;font-size:9px;letter-spacing:5px;}











#vblood.on{background:#f002;}













.vmb:hover{border-color:#0f06;color:#0f0;}

.vmb.act{border-color:#0f0;color:#0f0;background:#0f01;}





.vpb:hover{border-color:#f806;color:#f80;}

.vpb.act{border-color:#f80;color:#f80;background:#f801;}

#vinfo{padding:7px;flex:1;overflow-y:auto;font-size:9px;line-height:1.7;color:#444;}

#day{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-size:clamp(11px,3.5vw,16px);letter-spacing:3px;pointer-events:none;z-index:20;display:none;}

#day.show{display:block;}

#batwrap{position:fixed;right:8px;top:50%;transform:translateY(-50%);display:none;flex-direction:column;align-items:center;gap:3px;pointer-events:none;z-index:20;}

#batwrap.show{display:flex;}

#batcap{width:9px;height:4px;background:#0f0;border-radius:2px;}

#batout{width:20px;height:90px;border:2px solid #0f0;border-radius:3px;position:relative;}

#batfill{position:absolute;bottom:0;left:0;right:0;border-radius:1px;}

#batlbl{font-size:9px;letter-spacing:2px;}

#ventui{position:fixed;top:10px;left:10px;display:none;flex-direction:column;gap:3px;pointer-events:none;z-index:20;}

#ventui.show{display:flex;}

#ventlbl{color:#f80;font-size:9px;letter-spacing:2px;}

.vpip{width:10px;height:10px;border-radius:50%;border:1px solid #f80;}

.vpip.on{background:#f80;box-shadow:0 0 8px #f80;}

#shopbtn{position:fixed;top:10px;right:50px;font-size:clamp(9px,2.5vw,12px);letter-spacing:2px;border:1px solid #ff04;color:#ff0;padding:8px 12px;cursor:pointer;background:#1100;z-index:20;display:none;}

#shopbtn.show{display:block;}

#helpbtn{position:fixed;top:10px;right:10px;border:1px solid #0af6;color:#0af;padding:8px 14px;cursor:pointer;font-size:clamp(9px,2.5vw,12px);letter-spacing:2px;background:rgba(0,10,20,.85);font-family:inherit;z-index:310;display:block;}

#chgwrap{position:fixed;bottom:0;left:0;right:0;height:34px;display:none;align-items:center;justify-content:center;gap:12px;background:rgba(0,8,0,.85);border-top:1px solid #0f03;z-index:20;}

#chgwrap.show{display:flex;}

#chgwrap.hld{border-top-color:#0f0;background:rgba(0,20,0,.9);}

#chglbl{font-size:10px;letter-spacing:2px;color:#0f04;}

#chgwrap.hld #chglbl{color:#0f0;text-shadow:0 0 8px #0f0;}

#chgout{width:130px;height:7px;border:1px solid #0f03;border-radius:4px;overflow:hidden;}

#chgbar{height:100%;width:0;background:linear-gradient(to right,#0f0,#8f8);}

#shop{position:fixed;inset:0;background:#000d;z-index:350;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;overflow-y:auto;}

#shop.open{display:flex;}

#shop h2{color:#ff0;font-size:18px;letter-spacing:6px;}

#shopitems{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:460px;}

.sitem{border:1px solid #ff04;background:#110;border-radius:6px;padding:12px 14px;color:#ff0;font-size:clamp(10px,2.8vw,13px);cursor:pointer;min-width:clamp(100px,28vw,160px);text-align:center;}

.sc{color:#0f0;font-size:9px;margin-top:4px;}

#shopx{color:#f00;letter-spacing:3px;font-size:11px;cursor:pointer;border:1px solid #f004;padding:8px 18px;}

#warn.show{opacity:1;}

#js.on{display:flex;align-items:center;justify-content:center;}

#jsc{width:100%;height:100%;}

#morning{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}

#morning h2{font-size:clamp(20px,6vw,36px);letter-spacing:8px;text-shadow:0 0 30px #0f0;}

#mmsg{color:#0f05;font-size:clamp(12px,3.5vw,18px);letter-spacing:3px;}

#mearn{color:#ff0;font-size:15px;letter-spacing:4px;}

#mnext{color:#0f0;border:1px solid #0f0;padding:10px 28px;cursor:pointer;letter-spacing:3px;font-size:12px;background:transparent;font-family:inherit;}

            style="flex:1;accent-color:#0f0;cursor:pointer;"

      </div>



      <div>

          <div id="mouseSensVal" style="color:#0f0;font-size:11px;width:30px;">4</div>

      <div>

        <div style="display:flex;align-items:center;gap:12px;">

          <input type="range" id="touchSensSlider" min="1" max="20" value="6" step="1"

            style="flex:1;accent-color:#0f0;cursor:pointer;"

        </div>

      </div>

      </div>

        <div style="color:#ff0;font-size:11px;letter-spacing:3px;margin-bottom:8px;">CONTROLS</div>

      <button onclick="resetSettings()"

        RESET TO DEFAULTS

      </button>

    </div>

  </div>

</div>

function buildCorr(wallX, roomCH, wallZ, id, length, tw, th) {

  var mCF  = new THREE.MeshLambertMaterial({color: 0x181410});

  var mCW  = new THREE.MeshLambertMaterial({color: 0x141210});

  var mCC  = new THREE.MeshLambertMaterial({color: 0x121010});

  var mPipe= new THREE.MeshLambertMaterial({color: 0x0c0c0c});

  var cx, cy = roomCH / 2, cz;

  if (id === 'left') {

    cx = wallX - length / 2; cz = wallZ;

    var f = new THREE.Mesh(new THREE.PlaneGeometry(length, tw), mCF); f.rotation.x = -Math.PI/2; f.position.set(cx, 0.01, cz); gSc.add(f);

    var c = new THREE.Mesh(new THREE.PlaneGeometry(length, tw), mCC); c.rotation.x = Math.PI/2; c.position.set(cx, th, cz); gSc.add(c);

    if (th < roomCH) gB(cx, (th + roomCH)/2, cz, length, roomCH - th, tw, mCW);

    gB(cx, cy, cz - tw/2, length, roomCH, 0.1, mCW);

    gB(cx, cy, cz + tw/2, length, roomCH, 0.1, mCW);

    gB(wallX - length, cy, cz, 0.12, roomCH, tw + 0.2, mCW);

    for (var i = 0; i < 5; i++) gB(wallX - 2 - i * 2.5, cy, cz - tw * 0.4, 0.06, roomCH * 0.75, 0.06, mPipe);

    var pl = new THREE.PointLight(0x1a1208, 0, 14); pl.position.set(wallX - length/2, th - 0.2, cz); gSc.add(pl); corrLights['left'] = pl;

  } else if (id === 'right') {

    cx = wallX + length / 2; cz = wallZ;

    var f2 = new THREE.Mesh(new THREE.PlaneGeometry(length, tw), mCF); f2.rotation.x = -Math.PI/2; f2.position.set(cx, 0.01, cz); gSc.add(f2);

    var c2 = new THREE.Mesh(new THREE.PlaneGeometry(length, tw), mCC); c2.rotation.x = Math.PI/2; c2.position.set(cx, th, cz); gSc.add(c2);

    if (th < roomCH) gB(cx, (th + roomCH)/2, cz, length, roomCH - th, tw, mCW);

    gB(cx, cy, cz - tw/2, length, roomCH, 0.1, mCW);

    gB(cx, cy, cz + tw/2, length, roomCH, 0.1, mCW);

    gB(wallX + length, cy, cz, 0.12, roomCH, tw + 0.2, mCW);

    for (var j = 0; j < 5; j++) gB(wallX + 2 + j * 2.5, cy, cz - tw * 0.4, 0.06, roomCH * 0.75, 0.06, mPipe);

    var pr = new THREE.PointLight(0x1a1208, 0, 14); pr.position.set(wallX + length/2, th - 0.2, cz); gSc.add(pr); corrLights['right'] = pr;

  } else {

    cx = 0; cz = wallZ - length / 2;

    var f3 = new THREE.Mesh(new THREE.PlaneGeometry(tw, length), mCF); f3.rotation.x = -Math.PI/2; f3.position.set(cx, 0.01, cz); gSc.add(f3);

    var c3 = new THREE.Mesh(new THREE.PlaneGeometry(tw, length), mCC); c3.rotation.x = Math.PI/2; c3.position.set(cx, th, cz); gSc.add(c3);

    if (th < roomCH) gB(cx, (th + roomCH)/2, cz, tw, roomCH - th, length, mCW);

    gB(cx - tw/2, cy, cz, 0.1, roomCH, length, mCW);

    gB(cx + tw/2, cy, cz, 0.1, roomCH, length, mCW);

    gB(cx, cy, wallZ - length, tw + 0.2, roomCH, 0.12, mCW);

    for (var k = 0; k < 5; k++) gB(cx - tw * 0.4, cy, wallZ - 2 - k * 2.5, 0.06, roomCH * 0.75, 0.06, mPipe);

    var pf = new THREE.PointLight(0x1a1208, 0, 14); pf.position.set(cx, th - 0.2, cz); gSc.add(pf); corrLights['front'] = pf;

  }

}

var raycaster = new THREE.Raycaster();

function onCanvasClick(e) {
  if (!G.running || G.dead || G.morning || G.shopOpen) return;
  var gc = document.getElementById('gc');
  var rect = gc.getBoundingClientRect();
  var cx = e.clientX || (e.changedTouches && e.changedTouches[0].clientX) || 0;
  var cy = e.clientY || (e.changedTouches && e.changedTouches[0].clientY) || 0;
  raycaster.setFromCamera(
    new THREE.Vector2(((cx - rect.left) / rect.width) * 2 - 1, -((cy - rect.top) / rect.height) * 2 + 1),
    gCam
  );
  // Check lever (arm, grip ball, or big click zone)
  var leverH = gSc && gSc.userData.leverHandle;
  var leverGrip = gSc && gSc.userData.leverGrip;
  var leverCZ = gSc && gSc.userData.leverClickZone;
  if (leverH) {
    var leverObjs = [leverH];
    if (leverGrip) leverObjs.push(leverGrip);
    if (leverCZ)   leverObjs.push(leverCZ);
    var leverHits = raycaster.intersectObjects(leverObjs, true);
    if (leverHits.length) { handleLever(); return; }
  }
  var meshList = Object.values(panelMeshes).map(function(p) { return p.mesh; });
  var hits = raycaster.intersectObjects(meshList, false);
  if (!hits.length) return;
  var hitMesh = hits[0].object;
  var vals = Object.values(panelMeshes);
  for (var i = 0; i < vals.length; i++) {
    if (vals[i].mesh === hitMesh) { handlePanel(vals[i].side, vals[i].action); return; }
  }
}

// ─ LEVER / POWER CUT ─

function handleLever() {

  if (G_lever.locked) return; // battery dead — lever locked

  var lv = gSc && gSc.userData.leverGlow;

  var onDot  = gSc && gSc.userData.leverOnDot;

  var offDot = gSc && gSc.userData.leverOffDot;

  if (G_lever.off) {

    // ── RESTORE POWER ──

    G_lever.off = false;

    // Snap lever to ON with spring overshoot

    if (gSc && gSc.userData.leverGroup) {

      var target = gSc.userData.ROT_ON || 0.9;

      gSc.userData.leverRotTarget = target + 0.25; // overshoot up

      setTimeout(function() {

        if (gSc && gSc.userData.leverGroup) gSc.userData.leverRotTarget = target;

      }, 120);

    }

    if (lv) { lv.color.setHex(0xaa7700); lv.intensity = 1.8; }

    if (onDot  && onDot.material)  onDot.material.color.setHex(0x00ff44);

    if (offDot && offDot.material) offDot.material.color.setHex(0x880000);

    // Flicker lights back on

    var restoreStart = Date.now();

    var restoreInt = setInterval(function() {

      var prog = Math.min(1, (Date.now() - restoreStart) / 800);

      roomLights.forEach(function(rl) { rl.light.intensity = rl.base * prog; });

      if (prog >= 1) {
        clearInterval(restoreInt);
        monitorTurnOn();
      }

    }, 30);

    startLampBuzz();

    showWarn('POWER RESTORED', '#0f0');

    playDoorSlide();

    return;

  }

  // ── CUT POWER ──

  G_lever.off = true;

  // Snappy lever drop with overshoot

  if (gSc && gSc.userData.leverGroup) {

    var target2 = gSc.userData.ROT_OFF || -0.9;

    gSc.userData.leverRotTarget = target2 - 0.3; // overshoot down

    setTimeout(function() {

      if (gSc && gSc.userData.leverGroup) gSc.userData.leverRotTarget = target2;

    }, 100);

  }

  if (lv) { lv.color.setHex(0xff2200); lv.intensity = 2.5; } // mocna czerwona poswiata = wylaczone

  if (onDot  && onDot.material)  onDot.material.color.setHex(0x002200);

  if (offDot && offDot.material) offDot.material.color.setHex(0xff0000);

  playPowerCut();

  if (lampBuzzGain) {

    try { lampBuzzGain.gain.linearRampToValueAtTime(0, getAC().currentTime + 2.0); } catch(e) {}

  }

  // Rapid flicker then all lights die

  var flickCount2 = 0;

  var killLights = setInterval(function() {

    flickCount2++;

    var on = flickCount2 % 2 === 0;

    // Faster, more erratic flicker

    var intensity = on ? (Math.random() * 3.0 + 1.0) : 0;

    roomLights.forEach(function(rl) { rl.light.intensity = on ? rl.base * (intensity / 4.0) : 0; });

    if (flickCount2 >= 10) {

      clearInterval(killLights);

      // All lights fully dead

      roomLights.forEach(function(rl) { rl.light.intensity = 0; });
      // Kill monitor screen
      if (gSc && gSc.userData.monitorScr && gSc.userData.monitorScrOffTex) { gSc.userData.monitorScr.material.map = gSc.userData.monitorScrOffTex; gSc.userData.monitorScrOffTex.needsUpdate = true; }

      if (typeof corrLights !== 'undefined') Object.values(corrLights).forEach(function(l) { l.intensity = 0; });
      // Kill monitor screen
      if (gSc && gSc.userData.monitorScr) gSc.userData.monitorScr.material.map = gSc.userData.monitorScrOffTex;
      if (gSc && gSc.userData.monitorScrTex) gSc.userData.monitorScrTex.needsUpdate = true;

    }

  }, 80);

  G.flashOn = {left:false, front:false, right:false};

  G.doorLeft=false; G.doorRight=false; G.doorFront=false;

  doorAnim.left.tgt=8; doorAnim.right.tgt=8; doorAnim.front.tgt=8;

  playDoorSlide();

  if (isHollowApproaching()) {

    showWarn('POWER CUT — HOLLOW ENTERS', '#f00');

    hollowPassage();

  } else {

    showWarn('POWER CUT', '#f80');

  }

}

function isHollowApproaching() {

  // HOLLOW can approach only when all 3 corridors are otherwise empty

  return ['left','front','right'].some(function(s) {

    return MDEFS[MONS[s].defIdx].special === 'hollow' && MONS[s].pos > 0.1 && !MONS[s].waiting;

  });

}

function hollowPassage(side, mn, def) {

  if (G.dead) { G_lever.hollowInside = false; return; }

  G.camLocked = true;

  var hollowMesh = monMeshes[side];

  var eyeLight = hollowMesh && hollowMesh.userData.eyeLight;

  // Ustaw hollow przy drzwiach

  if (hollowMesh) {

    hollowMesh.visible = true;

    hollowMesh.position.copy(monPos3D(side, 0.92));

    if (side === 'left')       hollowMesh.rotation.y =  Math.PI/2;

    else if (side === 'right') hollowMesh.rotation.y = -Math.PI/2;

    else                       hollowMesh.rotation.y =  Math.PI;

    if (eyeLight) { eyeLight.intensity = 10.0; eyeLight.color.setHex(0xff0000); }

  }

  var targetYaw = side === 'left' ? Math.PI/2 : side === 'right' ? -Math.PI/2 : 0;

  var rotStart = G.camYaw;

  var t0 = null;

  showWarn('HOLLOW — POWER IS OFF', '#f00');

  function blinkLoop(ts) {

    if (!t0) t0 = ts;

    var elapsed = ts - t0;

    // Faza 1 (0-600ms): kamera obraca się do Hollowa

    if (elapsed < 600) {

      var prog = elapsed / 600;

      G.camYaw = rotStart + (targetYaw - rotStart) * prog;

      G.targetYaw = G.camYaw;

      if (gCam) gCam.rotation.set(0, G.camYaw, 0);

      if (eyeLight) eyeLight.intensity = 10.0;

      requestAnimationFrame(blinkLoop);

      return;

    }

    // Faza 2 (600-2200ms): oczy migają ON/OFF

    if (elapsed < 2200) {

      var blinkOn = Math.floor((elapsed - 600) / 180) % 2 === 0;

      if (eyeLight) eyeLight.intensity = blinkOn ? 12.0 : 0;

      if (hollowMesh) hollowMesh.visible = blinkOn;

      requestAnimationFrame(blinkLoop);

      return;

    }

    // Koniec — hollow znika

    if (hollowMesh) { hollowMesh.visible = false; }

    if (eyeLight) { eyeLight.intensity = 0; }

    G.camLocked = false;

    G_lever.hollowInside = false;

    // Reset hollow — losowa przerwa 15-30s przed następnym pojawieniem

    ['left','front','right'].forEach(function(s) {

      if (MDEFS[MONS[s].defIdx].special === 'hollow') {

        MONS[s].pos = 0;

        MONS[s].waiting = true;

        MONS[s].waitTimer = 15000 + Math.random() * 15000;

        MONS[s].rushing = false;

        MONS[s].frozen = false;

      } else {

        // Odblokuj pozostałych — krótka przerwa 3-5s

        MONS[s].frozen = false;

        if (!MONS[s].waiting) {

          MONS[s].waiting = true;

          MONS[s].waitTimer = 3000 + Math.random() * 2000;

        }

      }

    });

    showWarn('HOLLOW IS GONE', '#0f0');

  }

  requestAnimationFrame(blinkLoop);

}

function handlePanel(side, action) {

  if (G_lever.off) { showWarn('NO POWER!', '#f00'); return; }

  if (action === 'flash') {

    G.flashOn[side] = !G.flashOn[side];

    updateFlashlights();

    showWarn(G.flashOn[side] ? 'FLASHLIGHT ON' : 'FLASHLIGHT OFF', G.flashOn[side] ? '#ff0' : '#888');

    if (G.flashOn[side]) playFlashOn(); else playFlashOff();

    saveGame();

  } else if (action === 'door') {

    toggleDoor(side);

  } else if (action === 'zap') {

    zapVent();

  }

}

function toggleDoor(side) {
  if (!G.running || G.dead || G.morning) return;
  var TH = 2.4, OPEN_Y = 8, CLOSED_Y = TH / 2;
  if (side === 'left') {
    G.doorLeft = !G.doorLeft;
    doorAnim.left.tgt = G.doorLeft ? CLOSED_Y : OPEN_Y;
    showWarn(G.doorLeft ? 'LEFT — CLOSED' : 'LEFT — OPEN', G.doorLeft ? '#f00' : '#0f0');
  } else if (side === 'right') {
    G.doorRight = !G.doorRight;
    doorAnim.right.tgt = G.doorRight ? CLOSED_Y : OPEN_Y;
    showWarn(G.doorRight ? 'RIGHT — CLOSED' : 'RIGHT — OPEN', G.doorRight ? '#f00' : '#0f0');
  } else if (side === 'front') {
    G.doorFront = !G.doorFront;
    doorAnim.front.tgt = G.doorFront ? CLOSED_Y : OPEN_Y;
    showWarn(G.doorFront ? 'CENTER — CLOSED' : 'CENTER — OPEN', G.doorFront ? '#f00' : '#0f0');
  }
  playDoorSlide();
  saveGame();
}

function monitorTurnOn() {
  // 2 quick flickers then steady on — like a real CRT/fluorescent monitor waking up
  var ms   = gSc && gSc.userData.monitorScr;
  var mt   = gSc && gSc.userData.monitorScrTex;
  var moff = gSc && gSc.userData.monitorScrOffTex;
  var sg   = gSc && gSc.userData.monitorSgl;
  if (!ms || !mt) return;
  var seq = [1, 0, 1, 0, 1, 1, 0, 1]; // on/off pattern — flicker twice then on
  var step = 0;
  var iv = setInterval(function() {
    var on2 = !!seq[step];
    ms.material.map = on2 ? mt : moff;
    mt.needsUpdate = true; if (moff) moff.needsUpdate = true;
    if (sg) sg.intensity = on2 ? 0.4 : 0;
    step++;
    if (step >= seq.length) {
      clearInterval(iv);
      // Final state: on
      ms.material.map = mt; mt.needsUpdate = true;
      if (sg) sg.intensity = 0.4;
    }
  }, 80);
}

function updateDoorAnim(dt) {
  var speed = Math.min(1, dt * 0.014);
  var da = doorAnim.left, diff = da.tgt - da.cur;
  da.cur = Math.abs(diff) > 0.02 ? da.cur + diff * speed : da.tgt;
  if (leftDoor3D) leftDoor3D.position.y = da.cur;
  var db = doorAnim.right, diff2 = db.tgt - db.cur;
  db.cur = Math.abs(diff2) > 0.02 ? db.cur + diff2 * speed : db.tgt;
  if (rightDoor3D) rightDoor3D.position.y = db.cur;
  var dc = doorAnim.front, diff3 = dc.tgt - dc.cur;
  dc.cur = Math.abs(diff3) > 0.02 ? dc.cur + diff3 * speed : dc.tgt;
  if (frontDoor3D) frontDoor3D.position.y = dc.cur;
}

function ventGroundAttack() {
  if (G.dead) return;
  G.running = true;

  // Hide all monsters and vent
  Object.keys(MONS).forEach(function(s) {
    MONS[s].frozen = true;
    var m = monMeshes[s]; if (m) m.visible = false;
  });
  if (ventMesh) ventMesh.visible = false;
  if (ventGlow) ventGlow.intensity = 0;

  // Lock camera to face front corridor
  G.camLocked = true;
  G.targetYaw = 0;
  G.camYaw = 0;

  // Force front corridor light on regardless of battery
  if (corrLights.front) corrLights.front.intensity = 1.8;

  // Build ground version of vent monster (humanoid walking toward player)
  var ventDef = MDEFS[VENT.defIdx];
  var groundMesh = buildGameMonMesh(ventDef);
  groundMesh.position.set(0, 0, -13); // far end of front corridor
  groundMesh.rotation.y = Math.PI; // face player
  groundMesh.scale.set(1.1, 1.1, 1.1);
  gSc.add(groundMesh);

  // Show warning
  showWarn('IT IS COMING', '#f00');

  // Animate walk toward player
  var walkStart = Date.now();
  var walkDuration = 4000; // 4 seconds to reach player
  var walkAnim = setInterval(function() {
    if (G.dead) { clearInterval(walkAnim); gSc.remove(groundMesh); return; }
    var t = (Date.now() - walkStart) / walkDuration;
    if (t >= 1) {
      clearInterval(walkAnim);
      gSc.remove(groundMesh);
      triggerJS(ventDef, 'front');
      return;
    }
    // Move from z=-13 toward player at z=0
    var z = -13 + t * 12.5;
    groundMesh.position.set(0, 0, z);
    // Walking leg animation
    var legSwing = Math.sin(Date.now() * 0.012) * 0.35;
    if (groundMesh.userData.legL) groundMesh.userData.legL.rotation.x = legSwing;
    if (groundMesh.userData.legR) groundMesh.userData.legR.rotation.x = -legSwing;
    if (groundMesh.userData.armL) groundMesh.userData.armL.rotation.x = -legSwing * 0.5;
    if (groundMesh.userData.armR) groundMesh.userData.armR.rotation.x = legSwing * 0.5;
    // Force front corridor lit
    if (corrLights.front) corrLights.front.intensity = 1.8 + Math.sin(Date.now()*0.008)*0.3;
  }, 16);
}

function showMaskOverlay() {

  var el = document.getElementById('maskoverlay'); if (el) el.remove();

  var d = document.createElement('div');

  d.id = 'maskoverlay';

  d.style.cssText = 'position:fixed;inset:0;z-index:35;pointer-events:none;';

  var cvs = document.createElement('canvas');

  cvs.id = 'maskcanvas';

  cvs.style.cssText = 'position:absolute;inset:0;';

  d.appendChild(cvs);

  var timer = document.createElement('div');

  timer.id = 'masktimer';

  timer.style.cssText = 'position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:100px;height:3px;background:rgba(255,60,60,0.9);';

  d.appendChild(timer);

  document.body.appendChild(d);

  function drawMask() {

    var W = window.innerWidth, H = window.innerHeight;

    cvs.width = W; cvs.height = H;

    var ctx = cvs.getContext('2d');

    var cx = W/2, cy = H/2;

    var ew = W * 0.10, eh = H * 0.09, gap = W * 0.085;

    ctx.fillStyle = '#000';

    ctx.fillRect(0, 0, W, H);

    // Cut out eye holes using destination-out

    ctx.globalCompositeOperation = 'destination-out';

    ctx.fillStyle = 'rgba(255,255,255,1)';

    ctx.beginPath(); ctx.ellipse(cx - gap, cy, ew, eh, 0, 0, Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.ellipse(cx + gap, cy, ew, eh, 0, 0, Math.PI*2); ctx.fill();

    ctx.globalCompositeOperation = 'source-over';

  }

  drawMask();

  d._resize = function() { drawMask(); };

  window.addEventListener('resize', d._resize);

}

function updateHollowFlicker(dt) {

  if (!hollowFlickerActive) return;

  if (G_lever.off) { hollowFlickerActive = false; return; } // power cut, stop flickering

  hollowFlickerTimer -= dt;

  if (hollowFlickerTimer <= 0) {

    hollowFlickerCount++;

    if (hollowFlickerCount <= 6) {

      var on = hollowFlickerCount % 2 === 0;

      roomLights.forEach(function(rl) { rl.light.intensity = on ? rl.base : 0.02; });
      // Monitor flickers too
      (function(on2) {
        var ms = gSc && gSc.userData.monitorScr;
        var mt = gSc && gSc.userData.monitorScrTex;
        var moff = gSc && gSc.userData.monitorScrOffTex;
        var sg = gSc && gSc.userData.monitorSgl;
        if (ms) { ms.material.map = on2 ? mt : moff; if (mt) mt.needsUpdate = true; }
        if (sg) sg.intensity = on2 ? 0.4 : 0;
      })(on);

      hollowFlickerTimer = 120 + Math.random() * 80;

    } else {

      hollowFlickerActive = false;

      roomLights.forEach(function(rl) { rl.light.intensity = rl.base; });
      monitorTurnOn();

      showWarn('HOLLOW RUSHING — CUT THE POWER!', '#f00');

    }

  }

}

function checkHollowAttack() {

  if (G_lever.hollowInside) return;

  var sides = ['left', 'front', 'right'];

  for (var i = 0; i < sides.length; i++) {

    var side = sides[i];

    var mn = MONS[side];

    var def = MDEFS[mn.defIdx];

    if (def.special !== 'hollow' || !mn.rushing) continue;

    // Hollow opens closed doors — doors don't block it
    if (mn.pos > 0.5) {
      if (side === 'left'  && G.doorLeft)  { G.doorLeft  = false; doorAnim.left.tgt  = 8; playDoorSlide(); }
      if (side === 'right' && G.doorRight) { G.doorRight = false; doorAnim.right.tgt = 8; playDoorSlide(); }
      if (side === 'front' && G.doorFront) { G.doorFront = false; doorAnim.front.tgt = 8; playDoorSlide(); }
    }

    if (mn.pos >= 0.98) {

      if (G_lever.off) {

        // Lever off — hollow passes through

        G_lever.hollowInside = true;

        mn.pos = 0.98;

        mn.rushing = false;

        hollowPassage(side, mn, def);

      } else if (!G.dead) {

        // Lever on — jumpscare

        triggerJS(def, side);

      }

      return;

    }

  }

}

function setupInput() {

  var gc = document.getElementById('gc');

  // Click only fires if mouse didn't drag

  gc.addEventListener('mouseup', function(e) { if (!mdragged) onCanvasClick(e); });

  gc.addEventListener('touchend', function(e) { e.preventDefault(); if (!tdragged) onCanvasClick(e); }, {passive: false});

  // Charge bar removed from game - charging only in day room

  // Spacebar = mask toggle

  document.addEventListener('keydown', function(e) {

    if (!G.running || G.dead || G.morning || G.camLocked) return;

    if (e.code === 'Space' || e.key === ' ') {

      e.preventDefault();

      toggleMask();

    }

    // Szybkie sterowanie kamerą

    if (e.key === 'a' || e.key === 'A') {

      e.preventDefault();

      G.targetYaw = Math.PI / 2; // lewy korytarz

    }

    if (e.key === 'd' || e.key === 'D') {

      e.preventDefault();

      G.targetYaw = -Math.PI / 2; // prawy korytarz

    }

    if (e.key === 'w' || e.key === 'W') {

      e.preventDefault();

      G.targetYaw = 0; // środkowy korytarz

    }

  });

  var mdown = false, mlx = 0, mly = 0, mdragged = false, ttouch = false, tstart = 0, tstartY = 0, tdragged = false;

  var edgeZone = 90;

  var edgeOverlayActive = null;
  var edgeSnapped = false; // reset when mouse leaves zone

  var edgeOverlayEl = null;

  var edgeOverlayFadeTimer = null;

  function getEdgeTarget(dir) {

    var cur = G.camYaw;

    if (dir === 'left') {

      if (cur <= -Math.PI / 4) return 0;          // right → center

      if (cur < Math.PI / 4)  return Math.PI / 2; // center → left

      return null; // already left

    } else {

      if (cur >= Math.PI / 4)  return 0;           // left → center

      if (cur > -Math.PI / 4)  return -Math.PI / 2;// center → right

      return null; // already right

    }

  }

  function showEdgeOverlay(dir) {

    if (edgeOverlayActive === dir && edgeOverlayEl) return; // already showing

    hideEdgeOverlay();

    if (getEdgeTarget(dir) === null) return; // nowhere to go

    edgeOverlayActive = dir;

    var el = document.createElement('div');

    edgeOverlayEl = el;

    el.style.cssText = [

      'position:fixed;top:0;bottom:0;width:120px;z-index:30;pointer-events:all;',

      'cursor:pointer;',

      dir === 'left' ? 'left:0;' : 'right:0;',

      dir === 'left'

        ? 'background:linear-gradient(to right, rgba(0,255,80,0.18), transparent);'

        : 'background:linear-gradient(to left, rgba(0,255,80,0.18), transparent);',

      'border-' + (dir === 'left' ? 'right' : 'left') + ':none;',

      'transition:opacity 0.15s;',

    ].join('');

    // Arrow indicator

    var arrow = document.createElement('div');

    arrow.style.cssText = [

      'position:absolute;top:50%;transform:translateY(-50%);',

      'color:rgba(0,255,80,0.7);font-size:28px;',

      dir === 'left' ? 'left:12px;' : 'right:12px;',

    ].join('');

    arrow.textContent = dir === 'left' ? '◀' : '▶';

    el.appendChild(arrow);

    el.addEventListener('click', function() {

      var target = getEdgeTarget(dir);

      if (target !== null) G.targetYaw = target;

      hideEdgeOverlay();

    });

    document.body.appendChild(el);

    // Animate in

    el.style.opacity = '0';

    requestAnimationFrame(function() { if (edgeOverlayEl) edgeOverlayEl.style.opacity = '1'; });

  }

  function hideEdgeOverlay() {

    if (edgeOverlayFadeTimer) { clearTimeout(edgeOverlayFadeTimer); edgeOverlayFadeTimer = null; }

    if (edgeOverlayEl) { edgeOverlayEl.remove(); edgeOverlayEl = null; }

    edgeOverlayActive = null;

  }

  gc.addEventListener('mousedown', function(e) {

    mdown = true; mlx = e.clientX; mly = e.clientY; mdragged = false;

  });

  document.addEventListener('mousemove', function(e) {

    if (G.camLocked) return;

    if (!G.running || G.dead || G.morning) { hideEdgeOverlay(); return; }

    if (!mdown && SETTINGS.edgeScroll) {

      var W = window.innerWidth;

      var ex = e.clientX;

      var atLeft  = ex <= edgeZone;

      var atRight = ex >= W - edgeZone;

      if (atLeft) {
        // Instant snap on entering left edge — only once per entry
        var tgt = getEdgeTarget('left');
        if (tgt !== null && Math.abs(G.targetYaw - tgt) > 0.1 && !edgeSnapped) { G.targetYaw = tgt; edgeSnapped = true; }
        showEdgeOverlay('left');
      } else if (atRight) {
        // Instant snap on entering right edge — only once per entry
        var tgt2 = getEdgeTarget('right');
        if (tgt2 !== null && Math.abs(G.targetYaw - tgt2) > 0.1 && !edgeSnapped) { G.targetYaw = tgt2; edgeSnapped = true; }
        showEdgeOverlay('right');
      } else              { edgeSnapped = false; if (edgeOverlayActive && !edgeOverlayFadeTimer) {

        edgeOverlayFadeTimer = setTimeout(function() {

          edgeOverlayFadeTimer = null;

          hideEdgeOverlay();

        }, 120);

      }}

    } else if (mdown) {

      hideEdgeOverlay();

      var dx = e.clientX - mlx;

      var totalDx = e.clientX - mlx, totalDy = e.clientY - mly;

      if (Math.abs(totalDx) > 4 || Math.abs(totalDy) > 4) mdragged = true;

      G.targetYaw -= dx * (SETTINGS.mouseSens * 0.001);

      // full 360 rotation — no clamp

      mlx = e.clientX;

    }

  });

  document.addEventListener('mouseup', function() { mdown = false; });

  gc.addEventListener('touchstart', function(e) { if (e.touches.length !== 1) return; ttouch = true; tstart = e.touches[0].clientX; tstartY = e.touches[0].clientY; tdragged = false; }, {passive: true});

  document.addEventListener('touchmove', function(e) {

    if (!ttouch) return;

    if (G.camLocked) return; // zablokowane podczas przejścia hollow

    var dx = e.touches[0].clientX - tstart;

    var dy = e.touches[0].clientY - tstartY;

    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) tdragged = true;

    G.targetYaw -= dx * (SETTINGS.touchSens * 0.001);

    // full 360 rotation — no clamp

    tstart = e.touches[0].clientX;

  }, {passive: true});

  document.addEventListener('touchend', function() { ttouch = false; });

}

function miniKeyHandler(e) { if (e.key === 'Escape') exitChargeMini(); }

function handleMiniClick(down) {

  if (!chargeGame.active) return;

  var task = CHARGE_TASKS[chargeGame.task % CHARGE_TASKS.length];

  if (task.type === 'click' && down) {

    chargeGame.clicks++;

    document.getElementById('cmcnt').textContent = chargeGame.clicks;

    if (chargeGame.clicks >= task.needed) nextMiniTask();

  } else if (task.type === 'rhythm' && down) {

    chargeGame.clicks++;

    document.getElementById('cmcnt').textContent = chargeGame.clicks;

    if (chargeGame.clicks >= task.needed) nextMiniTask();

  }

  updateMiniBar();

}

function handleMiniRelease(duration) {

  if (!chargeGame.active) return;

  var task = CHARGE_TASKS[chargeGame.task % CHARGE_TASKS.length];

  if (task.type === 'hold') {

    if (duration >= 600 && duration <= 2000) {

      chargeGame.clicks++;

      document.getElementById('cmcnt').textContent = chargeGame.clicks;

      if (chargeGame.clicks >= task.needed) nextMiniTask();

    }

  }

  updateMiniBar();

}

function updateMiniBar() {

  var task = CHARGE_TASKS[chargeGame.task % CHARGE_TASKS.length];

  var p = Math.min(1, chargeGame.clicks / task.needed);

  var fill = document.getElementById('cmfill');

  if (fill) fill.style.width = (p * 100) + '%';

}

function nextMiniTask() {

  var amount = G.maxBattery * 0.28;

  G.battery = Math.min(G.maxBattery, G.battery + amount);

  updateBatUI();

  chargeGame.task++;

  chargeGame.clicks = 0;

  // If battery full, exit

  if (G.battery >= G.maxBattery) { exitChargeMini(); return; }

  // Show next task

  showMiniOverlay();

  playBeep();

}

function exitChargeMini() {

  chargeGame.active = false;

  G.chargeMini = false;

  G.zoomingToMonitor = false;

  var el = document.getElementById('chargemini');

  if (el) el.remove();

  miniOverlay = null;

  document.removeEventListener('keydown', miniKeyHandler);

}

function monPos3D(id, t) {

  // t=0 -> far end of corridor (spawn point), t=1 -> at the door (attack)

  if (id === 'left')  return new THREE.Vector3(-4.0 - (1.0 - t) * 14, 0, 0);

  if (id === 'right') return new THREE.Vector3( 4.0 + (1.0 - t) * 14, 0, 0);

  return new THREE.Vector3(0, 0, -5.0 - (1.0 - t) * 14);

}

function updateFlashlights() {

  var pct = G.battery / G.maxBattery;

  ['left', 'front', 'right'].forEach(function(side) {

    var on = G.flashOn[side] && G.battery > 0;

    var fl = flashSpots[side]; if (!fl) return;

    var ef = on ? flickI * (0.3 + pct * 0.7) : 0;

    fl.spot.intensity = ef * 9;

    fl.spot.position.set(0, 1.6, 0);

    if (side === 'left')       fl.target.position.set(-15, 1.0, 0);

    else if (side === 'right') fl.target.position.set(15, 1.0, 0);

    else                       fl.target.position.set(0, 1.0, -18);

    if (corrLights[side]) corrLights[side].intensity = on ? ef * 6 : 0;

    // Door lamp follows flashlight

    var doorMesh = side==='left'?leftDoor3D:side==='right'?rightDoor3D:frontDoor3D;

    if (doorMesh && doorMesh.userData.lamp) doorMesh.userData.lamp.intensity = on ? ef * 1.8 : 0;

    var mn = MONS[side];

    if (mn) {

      var def = MDEFS[mn.defIdx];

      if (def.special === 'hollow' && mn.rushing && on && ef > 0.3) {

        if (!G_mask.on) {

          (function(d,s){setTimeout(function(){triggerJS(d,s);},100);})(def,side);

        }

        return;

      }

      mn.frozen = on && ef > 0.3 && (!def.special || def.special !== 'hollow');

      // Sprawdź czy hollow jest aktywny — jeśli tak, inni są niewidoczni

      var hollowActive2 = ['left','front','right'].some(function(s) {

        return MDEFS[MONS[s].defIdx].special === 'hollow' && MONS[s].pos > 0.05 && !MONS[s].waiting;

      });

      var mesh = monMeshes[side];

      if (mesh) {

        if (def.special === 'hollow' && mn.pos > 0.05 && !mn.waiting) {

          mesh.visible = true; // HOLLOW zawsze widoczny

        } else if (hollowActive2) {

          mesh.visible = false; // hollow aktywny — inni niewidoczni

        } else if (mn.pos > 0.05 && !mn.waiting && mn.spawnDelay <= 0) {

          mesh.visible = on && ef > 0.15;

        }

      }

    }

  });

  // Flashlight does NOT stop vent — nothing does

}

function updateFlicker(dt) {

  flickT -= dt;

  if (flickT < 0) {

    var p = G.battery / G.maxBattery;

    if (p > 0.3)      { flickI = 0.85 + Math.random() * 0.15; flickT = 120 + Math.random() * 350; }

    else if (p > 0.1) { flickI = Math.random() > 0.15 ? 0.5 + Math.random() * 0.5 : 0.05; flickT = 40 + Math.random() * 120; }

    else              { flickI = Math.random() > 0.35 ? Math.random() * 0.35 : 0; flickT = 25 + Math.random() * 70; }

  }

}

function animateMon(mn, dt) {

  var mesh = monMeshes[mn.id]; if (!mesh || !mesh.visible) return;

  // Don't animate if waiting or spawn delay still active

  if (mn.waiting || mn.spawnDelay > 0) { mesh.visible = false; return; }

  var now = Date.now() / 1000, t = mn.pos;

  // Only walk-animate when actually moving (not frozen), legs still when stopped

  var isMoving = !mn.frozen && mn.pos > 0 && mn.pos < 1;

  var wf = isMoving ? 4.0 : 0, wa = isMoving ? 0.28 : 0;

  var wc = Math.sin(now * wf + mn.id.charCodeAt(0));

  var p3 = monPos3D(mn.id, t);

  mesh.position.set(p3.x, isMoving ? Math.sin(now * wf * 2) * 0.04 : 0, p3.z);

  if (mn.id === 'left')       mesh.rotation.y = -Math.PI / 2;

  else if (mn.id === 'right') mesh.rotation.y =  Math.PI / 2;

  else                        mesh.rotation.y =  Math.PI;

  if (mesh.userData.legL) mesh.userData.legL.rotation.x =  wc * wa;

  if (mesh.userData.legR) mesh.userData.legR.rotation.x = -wc * wa;

  if (mesh.userData.armL) {

    mesh.userData.armL.rotation.x = -wc * wa * 0.6 + (mn.frozen ? 0.5 : 0);

    mesh.userData.armL.rotation.z = mn.frozen ?  0.35 : 0;

  }

  if (mesh.userData.armR) {

    mesh.userData.armR.rotation.x =  wc * wa * 0.6 + (mn.frozen ? 0.5 : 0);

    mesh.userData.armR.rotation.z = mn.frozen ? -0.35 : 0;

  }

  if (mesh.userData.head) mesh.userData.head.rotation.x = mn.frozen ? 0 : Math.sin(now * 1.4) * 0.04;

}

function checkKnock(dt) {

  ['left', 'front', 'right'].forEach(function(side) {

    var mn = MONS[side];

    if (mn.waiting || mn.spawnDelay > 0 || mn.pos < 0.5) return;

    var def = MDEFS[mn.defIdx];

    // HOLLOW special rush check

    if (def.special === 'hollow' && mn.rushing) {

      var doorUsed = (side==='left'&&G.doorLeft)||(side==='right'&&G.doorRight)||(side==='front'&&G.doorFront);

      if (doorUsed && !G_mask.on) { triggerJS(def, side); return; }

      if (mn.pos >= 0.98) { triggerJS(def, side); return; }

      return;

    }

    var isDoorOpen = (side==='left' && !G.doorLeft) ||

                     (side==='right' && !G.doorRight) ||

                     (side==='front' && !G.doorFront);

    // If door is open and monster close enough — walk straight in

    if (isDoorOpen && mn.pos >= 0.82) {

      (function(d, s) { setTimeout(function() { triggerJS(d, s); }, 200); })(def, side);

      mn.pos = 1; // stop advancing

      return;

    }

    // Door is closed — knock at threshold

    if (mn.pos < 0.82) return;

    mn.knockTimer -= dt;

    if (mn.knockTimer <= 0) {

      playKnock(side);

      mn.knockTimer = Math.max(800, 4000 - mn.pos * 3000);

      var blocked = (side==='left'&&G.doorLeft)||(side==='right'&&G.doorRight)||(side==='front'&&G.doorFront);

      if (blocked) {

        // Knock opens door and monster retreats

        mn.waiting = true;

        mn.waitTimer = 12000 + Math.random() * 8000;

        mn.pos = 0; mn.rushing = false; mn.frozen = false;
        G.lastMonsterLeft = Date.now(); // globalny cooldown — następny bot poczeka

        var mesh = monMeshes[side]; if (mesh) mesh.visible = false;

        setTimeout(function() {

          if (side==='left')  { G.doorLeft=false;  doorAnim.left.tgt=8; }

          if (side==='right') { G.doorRight=false; doorAnim.right.tgt=8; }

          if (side==='front') { G.doorFront=false; doorAnim.front.tgt=8; }

          playDoorSlide();

        }, 600);

      } else if (mn.pos >= 0.98) {

        (function(d, s) { setTimeout(function() { triggerJS(d, s); }, 350); })(def, side);

      }

    }

  });

}

function checkMorning() {

  G.nightTimer += 16;

  // Auto-save every ~10 seconds

  if (G.nightTimer % 10000 < 16) saveGame();

  var dur = Math.max(90000, 180000 - G.day * 5000);

  if (G.nightTimer >= dur) { survivedNight(); return; }

  var pct = G.nightTimer / dur;

  // Night goes from 12:00 PM (noon) to 12:00 AM (midnight)
  var totalMins = Math.floor(pct * 720); // 720 minutes = 12 hours
  var rawHr24 = 12 + Math.floor(totalMins / 60); // 12..23
  var mn = totalMins % 60;
  var displayHr = rawHr24 % 12 || 12; // 12h format: 12,1,2..11,12
  var ampm = rawHr24 < 12 ? 'AM' : (rawHr24 < 24 ? 'PM' : 'AM');
  // 12=PM, 13-23=PM, but 12 noon=PM, 0=AM — here rawHr24 starts at 12 (PM)
  ampm = rawHr24 >= 12 && rawHr24 < 24 ? 'PM' : 'AM';
  if (rawHr24 === 24 || rawHr24 === 0) { displayHr = 12; ampm = 'AM'; }

  document.getElementById('day').textContent = 'NIGHT ' + G.day + ' ' + String(displayHr).padStart(2,'0') + ':' + String(mn).padStart(2,'0') + ' ' + ampm;

  // Animate 3D clock hands
  if (gSc && gSc.userData.clkHour) {
    var cx = gSc.userData.clkX, cy = gSc.userData.clkY;
    var secReal = (G.nightTimer / 1000) % 60;
    var minReal = (G.nightTimer / 60000) % 60;
    var hrReal  = (G.nightTimer / 3600000) % 12;
    var secAng  = secReal / 60 * Math.PI * 2;
    var minAng  = (minReal + secReal/60) / 60 * Math.PI * 2;
    var hrAng   = (hrReal + minReal/60) / 12 * Math.PI * 2;

    var hh = gSc.userData.clkHour;
    hh.position.set(cx + Math.sin(hrAng)*0.055, cy + Math.cos(hrAng)*0.055, hh.position.z);
    hh.rotation.z = -hrAng;

    var mh = gSc.userData.clkMin;
    mh.position.set(cx + Math.sin(minAng)*0.08, cy + Math.cos(minAng)*0.08, mh.position.z);
    mh.rotation.z = -minAng;

    var sh = gSc.userData.clkSec;
    sh.position.set(cx + Math.sin(secAng)*0.09, cy + Math.cos(secAng)*0.09, sh.position.z);
    sh.rotation.z = -secAng;
  }

}

function resetNight() {

  G.nightTimer = 0; G.camYaw = 0; G.targetYaw = 0; G.powerCutTriggered = false;

  G.flashOn = {left: false, front: false, right: false};

  G.doorLeft = false; G.doorRight = false; G.doorFront = false;

  doorAnim.left.cur  = 8; doorAnim.left.tgt  = 8;
  doorAnim.right.cur = 8; doorAnim.right.tgt = 8;
  doorAnim.front.cur = 8; doorAnim.front.tgt = 8;
      
  Object.values(flashSpots).forEach(function(f) { f.spot.intensity = 0; });

  Object.values(corrLights).forEach(function(l) { l.intensity = 0; });

  if (!G.upgrades) G.upgrades = {};

  if (!G.upgrades.doorPower) G.upgrades.doorPower = 0;

  if (!G.upgrades.lamp) G.upgrades.lamp = 0;

  if (!G.upgrades.carpet) G.upgrades.carpet = 0;

  if (!G.upgrades.sofa) G.upgrades.sofa = 0;

  if (!G.upgrades.posters) G.upgrades.posters = 0;

  if (!G.upgrades.mask) G.upgrades.mask = 0;

  updateBatUI();

  var spd = Math.max(0.3, 1 + (G.day - 1) * 0.10);

  var d = G.day - 1;

  // Indeksy potworów bez HOLLOW (defIdx 3)

  var normalPool = [];

  for (var ni = 0; ni < MDEFS.length; ni++) {

    if (MDEFS[ni].special !== 'hollow') normalPool.push(ni);

  }

  // Night 1: max 1 active bot at once, Night 2: max 2, Night 3+: max 3
  var maxActive = G.day >= 3 ? 3 : G.day >= 2 ? 2 : 1;

  var allSides = ['left', 'front', 'right'];

  function shuffleArr(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  // HOLLOW setup (night 3+)
  var hollowActive = G.day >= 3;
  var hollowSide = allSides[Math.floor(Math.random() * allSides.length)];
  var hollowDefIdx = MDEFS.findIndex(function(m){ return m.special === 'hollow'; });

  // Build shuffled normal monster pool for this night
  var shuffledPool = normalPool.slice();
  shuffleArr(shuffledPool);

  // G.nightMaxActive — used by the dynamic spawner below
  G.nightMaxActive = maxActive;
  G.nightMonsterPool = shuffledPool;
  G.nightMonsterPoolIdx = 0;
  G.lastMonsterLeft = null; // reset cooldown na start nocy

  // Initialize all corridor slots — ALL are "open" (no spawnDelay=-1)
  allSides.forEach(function(side) {

    var mn = MONS[side];

    mn.pos = 0;
    mn.frozen = false;
    mn.waiting = true;   // start waiting — spawner will activate when quota allows
    mn.waitTimer = 0;
    mn.rushing = false;
    mn.knockTimer = (side==='left'?4500:side==='right'?4200:5500) + Math.random()*3000;

    var mesh = monMeshes[side];
    if (mesh) { mesh.visible = false; mesh.position.copy(monPos3D(side, 0)); }

    if (hollowActive && side === hollowSide) {
      // HOLLOW slot
      mn.defIdx    = hollowDefIdx;
      mn.baseSpeed = MDEFS[hollowDefIdx].speed * spd;
      mn.speed     = mn.baseSpeed;
      mn.spawnDelay = 0;
      mn.waiting   = true;
      mn.waitTimer = 15000 + Math.random() * 15000;
      mn._isHollowSlot = true;
    } else {

      // Start with a random initial delay so they don't all rush at once
      mn.waiting   = true;
      mn.waitTimer = 8000 + Math.random() * 10000; // 8-18s initial wait
    }

// ─ 3D ATTACK SEQUENCE ─

var attackActive = false;

function triggerJS(def, attackSide) {

  if (G.dead) return;

  G.dead = true; G.running = false;

  G.camLocked = false; // unlock camera

  attackActive = true;

  updateLampBuzz(0);

  playJSSnd();

  hideMaskOverlay(); hideMaskPrompt();

  var side = attackSide || 'front';

  // Camera target yaw to face the attacking corridor

  var targetYaw = side === 'left' ? Math.PI/2 : side === 'right' ? -Math.PI/2 : 0;

  var rotStart = G.camYaw, rotEnd = targetYaw;

  var t0 = null, phase = 'rotate';

  var monMesh = monMeshes[side];

  if (monMesh) {

    monMesh.visible = true;

    var p3 = monPos3D(side, 0.85);

    monMesh.position.copy(p3);

    // Face toward player (into the room)

    if (side === 'left')       monMesh.rotation.y =  Math.PI / 2;

    else if (side === 'right') monMesh.rotation.y = -Math.PI / 2;

    else                       monMesh.rotation.y =  0;

  }

  function attackLoop(ts) {

    if (!t0) t0 = ts;

    var elapsed = ts - t0;

    if (phase === 'rotate') {

      var prog = Math.min(1, elapsed / 800);

      G.camYaw = rotStart + (rotEnd - rotStart) * prog;

      gCam.rotation.set(0, G.camYaw, 0);

      if (gR) gR.render(gSc, gCam);

      if (prog >= 1) { phase = 'approach'; t0 = ts; }

      requestAnimationFrame(attackLoop);

    } else if (phase === 'approach') {

      var prog = Math.min(1, elapsed / 1500);

      var ease = 1 - Math.pow(1 - prog, 3);

      if (monMesh) {

        var pFar = monPos3D(side, 0.85);

        var pNear = monPos3D(side, 0.99);

        monMesh.position.lerpVectors(pFar, pNear, ease);

        monMesh.visible = true;

        if (side === 'left')       monMesh.rotation.y =  Math.PI / 2;

        else if (side === 'right') monMesh.rotation.y = -Math.PI / 2;

        else                       monMesh.rotation.y =  0;

        var now2 = ts / 1000;

        if (monMesh.userData.legL) monMesh.userData.legL.rotation.x = Math.sin(now2 * 8) * 0.4;

        if (monMesh.userData.legR) monMesh.userData.legR.rotation.x = -Math.sin(now2 * 8) * 0.4;

        if (monMesh.userData.armL) monMesh.userData.armL.rotation.x = -Math.sin(now2 * 8) * 0.3;

        if (monMesh.userData.armR) monMesh.userData.armR.rotation.x = Math.sin(now2 * 8) * 0.3;

      }

      gCam.rotation.set(ease * 0.3, G.camYaw, 0);

      if (gR) gR.render(gSc, gCam);

      if (prog >= 1) { phase = 'eat'; t0 = ts; }

      requestAnimationFrame(attackLoop);

    } else if (phase === 'eat') {

      var prog = Math.min(1, elapsed / 600);

      var shake = (1 - prog) * 0.08;

      gCam.rotation.set(0.3 + shake * (Math.random() - 0.5), G.camYaw + shake * (Math.random() - 0.5), 0);

      var ov = document.getElementById('attackoverlay');

      if (!ov) { ov = document.createElement('div'); ov.id = 'attackoverlay'; ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0);z-index:150;pointer-events:none;'; document.body.appendChild(ov); }

      ov.style.background = 'rgba(0,0,0,' + (prog * 0.95) + ')';

      if (gR) gR.render(gSc, gCam);

      if (prog >= 1) {

        var ov2 = document.getElementById('attackoverlay'); if (ov2) ov2.remove();

        attackActive = false;

        showGameOver(def);

        return;

      }

      requestAnimationFrame(attackLoop);

    }

  }

  requestAnimationFrame(attackLoop);

}

function showGameOver(def) {

  document.getElementById('js').classList.remove('on');

  document.getElementById('morning').classList.add('on');

  document.getElementById('mmsg').textContent = def.name ? ('CAUGHT BY ' + def.name + '! Night ' + G.day) : ('NIGHT ' + G.day + ' — defeated');

  document.getElementById('earnval').textContent = '0';

  document.getElementById('mnext').textContent = 'TRY AGAIN';

  G.battery = G.maxBattery;

  saveGame();

}

      dead: G.dead,

      morning: G.morning,

    };

    localStorage.setItem('nightwatch_save', JSON.stringify(data));

function loadGame() {

  try {

    var raw = localStorage.getItem('nightwatch_save');

    if (!raw) return false;

    var data = JSON.parse(raw);

    G.day         = data.day         || 1;

    G.money       = data.money       || 0;

    G.battery     = data.battery     != null ? data.battery : 100;

    G.maxBattery  = data.maxBattery  || 100;

    G.upgrades    = data.upgrades    || {battery:0,recharge:0,doorPower:0,lamp:0,carpet:0,sofa:0,posters:0,mask:0};

    G.nightTimer  = data.nightTimer  || 0;

    G.dead        = data.dead        || false;

    G.morning     = data.morning     || false;

    G.camYaw      = data.camYaw      || 0;

    G.targetYaw   = data.targetYaw   || 0;

    G.doorLeft    = data.doorLeft    || false;

    G.doorRight   = data.doorRight   || false;

    G.doorFront   = data.doorFront   || false;

    G.flashOn     = data.flashOn     || {left:false,front:false,right:false};

    bought = data.bought || {};

    if (data.mons) {

      ['left','front','right'].forEach(function(s) {

        if (data.mons[s]) {

          MONS[s].pos        = data.mons[s].pos        || 0;

          MONS[s].defIdx     = data.mons[s].defIdx     || 0;

          MONS[s].waiting    = data.mons[s].waiting    || false;

          MONS[s].waitTimer  = data.mons[s].waitTimer  || 0;

          MONS[s].spawnDelay = data.mons[s].spawnDelay || 0;

          MONS[s].rushing    = data.mons[s].rushing    || false;

        }

      });

    }

    if (data.vent) {

      VENT.stage         = data.vent.stage         || 0;

      VENT.timer         = data.vent.timer         || 0;

    var flickBase = batPct > 0.6 ? 3.4 + Math.random()*0.6 :

  if (G.flashOn.right && G.battery > 0) drain += 0.00060;

  if (G.doorLeft)  drain += 0.00070 * (1 - G.upgrades.doorPower * 0.28);

  if (G.doorRight) drain += 0.00070 * (1 - G.upgrades.doorPower * 0.28);

  if (ec) { ec.textContent = 'EDGE SCROLL: ON'; ec.style.borderColor = '#0f0'; ec.style.color = '#0f0'; }

}

function applyFontSize(val) {

  SETTINGS.fontSize = parseInt(val);

  // Apply to entire document - override all elements

  document.documentElement.style.setProperty('--fs', val + 'px');

  document.body.style.fontSize = val + 'px';

  // Force all elements to inherit

  var style = document.getElementById('fontSizeStyle');

  if (!style) { style = document.createElement('style'); style.id = 'fontSizeStyle'; document.head.appendChild(style); }

  style.textContent = '*, *::before, *::after { font-size: ' + val + 'px !important; }' +

    'h1 { font-size: clamp(24px,' + (val*3.5) + 'px,52px) !important; }' +

    '.lb { font-size: ' + val + 'px !important; }';

  var el = document.getElementById('fontSizeVal'); if (el) el.textContent = val + 'px';

  var pr = document.getElementById('fontPreview'); if (pr) pr.style.fontSize = val + 'px';

  var sl = document.getElementById('fontSizeSlider'); if (sl) sl.value = val;

  saveSettings();

}

function applySens(val, type) {

  val = parseInt(val);

  if (type === 'mouse') {

    SETTINGS.mouseSens = val;

    var el = document.getElementById('mouseSensVal'); if (el) el.textContent = val;

  } else {

    SETTINGS.touchSens = val;

    var el2 = document.getElementById('touchSensVal'); if (el2) el2.textContent = val;

  }

  saveSettings();

}

var settingsWasRunning = false;

function openSettings() {

  if (G.running && !G.dead && !G.morning) {

    settingsWasRunning = true;

    G.running = false;

  } else {

    settingsWasRunning = false;

  }

  var ov = document.getElementById('settingsoverlay');

  ov.style.display = 'flex';

  var fs = document.getElementById('fontSizeSlider'); if (fs) fs.value = SETTINGS.fontSize;

  var fv = document.getElementById('fontSizeVal'); if (fv) fv.textContent = SETTINGS.fontSize + 'px';

  var ms = document.getElementById('mouseSensSlider'); if (ms) ms.value = SETTINGS.mouseSens;

  var mv = document.getElementById('mouseSensVal'); if (mv) mv.textContent = SETTINGS.mouseSens;

  var ts = document.getElementById('touchSensSlider'); if (ts) ts.value = SETTINGS.touchSens;

  var tv = document.getElementById('touchSensVal'); if (tv) tv.textContent = SETTINGS.touchSens;

  var ec = document.getElementById('edgeScrollToggle');

  if (ec) {

    ec.textContent = SETTINGS.edgeScroll ? 'EDGE SCROLL: ON' : 'EDGE SCROLL: OFF';

    ec.style.borderColor = SETTINGS.edgeScroll ? '#0f0' : '#555';

    ec.style.color = SETTINGS.edgeScroll ? '#0f0' : '#555';

  }

}

function toggleEdgeScroll() {

  SETTINGS.edgeScroll = !SETTINGS.edgeScroll;

  saveSettings();

  var ec = document.getElementById('edgeScrollToggle');

  if (ec) {

    ec.textContent = SETTINGS.edgeScroll ? 'EDGE SCROLL: ON' : 'EDGE SCROLL: OFF';

    ec.style.borderColor = SETTINGS.edgeScroll ? '#0f0' : '#555';

    ec.style.color = SETTINGS.edgeScroll ? '#0f0' : '#555';

  }

}

function closeSettings() {

  document.getElementById('settingsoverlay').style.display = 'none';

  if (settingsWasRunning) { G.running = true; settingsWasRunning = false; }

}

// ─ LOBBY ─

function initLobby() {

  var save = null;

  try { var r = localStorage.getItem('nightwatch_save'); if (r) save = JSON.parse(r); } catch(e) {}

  if (save && save.day) {

    document.getElementById('lobbycont').style.display = 'inline-block';

    document.getElementById('lobbyday').textContent = save.day;

  }

}

window.addEventListener('load', function() { loadSettings(); initLobby(); });

function continueGame() {

  startGame(true);

}

function startFresh() {

  if (localStorage.getItem('nightwatch_save')) {

    if (!confirm('Delete save and start over?')) return;

    clearSave();

  }

  startGame(false);

}

function startGame(loadSave) {

  document.getElementById('lobby').style.display = 'none';

  document.getElementById('gc').classList.add('show');

  ['day','batwrap','ventui'].forEach(function(id) {

    var el = document.getElementById(id); if(el) el.classList.add('show');

  });

  if (!gR) initGame();

  if (loadSave) {

    var loaded = loadGame();

    if (!loaded) {

      G.day=1;G.money=0;G.dead=false;G.morning=false;

      G.upgrades={battery:0,recharge:0,doorPower:0,lamp:0,carpet:0,sofa:0,posters:0,mask:0};

      G.maxBattery=100;G.battery=G.maxBattery;bought={};

    } else {

      reapplyUpgrades();

      restoreGameState();

    }

  } else {

    G.day=1;G.money=0;G.dead=false;G.morning=false;

    G.upgrades={battery:0,recharge:0,doorPower:0,lamp:0,carpet:0,sofa:0,posters:0,mask:0};

    G.maxBattery=100;G.battery=G.maxBattery;bought={};

  }

  G.dead=false;G.morning=false;G.powerCutTriggered=false;

  resetNight(); // always randomize corridors fresh

  G.running=true;

  try{getAC();setTimeout(startAmbient,500);}catch(e){}

}

function restoreGameState() {

  // Camera

  G.camYaw = G.camYaw || 0;

  G.targetYaw = G.targetYaw || 0;

  if (gCam) gCam.rotation.set(0, G.camYaw, 0);

  // Doors - restore animated positions

  var TH = 2.4, OPEN_Y = 8, CLOSED_Y = TH / 2;

  doorAnim.left.cur  = G.doorLeft  ? 1.2 : 8;
  doorAnim.left.tgt  = G.doorLeft  ? 1.2 : 8;
  doorAnim.right.cur = G.doorRight ? 1.2 : 8;
  doorAnim.right.tgt = G.doorRight ? 1.2 : 8;
  doorAnim.front.cur = G.doorFront ? 1.2 : 8;
  doorAnim.front.tgt = G.doorFront ? 1.2 : 8;
  if (leftDoor3D)  leftDoor3D.position.y =  doorAnim.left.cur;
  if (rightDoor3D) rightDoor3D.position.y =  doorAnim.right.cur;
  if (frontDoor3D) frontDoor3D.position.y =  doorAnim.front.cur;

  // Flashlights

  updateFlashlights();

  updateBatUI();

  // Monsters - restore positions

  ['left','front','right'].forEach(function(side) {

    var mn = MONS[side];

    mn.baseSpeed = MDEFS[mn.defIdx].speed * Math.max(0.3, 1 + (G.day-1)*0.18);

    mn.speed = mn.baseSpeed;

    var mesh = monMeshes[side];

    if (mesh) {

      var p = monPos3D(side, mn.pos);

      mesh.position.copy(p);

      mesh.visible = mn.pos > 0.05 && !mn.waiting && mn.spawnDelay <= 0;

    }

  });

  // Vent

  updateVentUI();

  if (ventMesh) { ventMesh.visible = VENT.stage > 0; ventMesh.position.set(0, 2.1, -14 + VENT.stage * 3.0); }

  if (ventGlow)  ventGlow.intensity = VENT.stage > 0 ? VENT.stage * 0.4 : 0;

  // Office lamp

  if (officeLamp) officeLamp.intensity = 3.6;

}

var helpWasRunning = false;

  return [

    {h:'BASICS', t:'Survive the night from 12:00 to 00:00. You sit in an office with three corridors — left, center and right. Monsters can come through any of them. Watch the corridors, use flashlights and doors to survive until dawn.'},

    {h:'CAMERA CONTROLS', t:'Drag the screen left/right with mouse or finger to rotate your view.\n\n⚡ QUICK CONTROLS (keyboard):\n[A] — snap left corridor\n[W] — snap center corridor\n[D] — snap right corridor\n\n⚡ EDGE SCROLL:\nMouse to far left/right screen edge → camera snaps to that corridor'},

    {h:'CORRIDOR PANELS', t:'At each corridor opening there are two buttons:\n\n🟢 GREEN — flashlight on/off in THAT corridor\n🔴 RED — closes or opens the shutter in THAT corridor\n\nAt the desk:\n🔵 BLUE — zap the Hanger in the vent'},

    {h:'FLASHLIGHT', t:'Flashlight illuminates corridor and FREEZES monsters — they cannot move while lit. Without flashlight you see nothing in the tunnel.\n\nFLASHLIGHT DRAINS BATTERY. Use only when needed.'},

    {h:'DOORS (SHUTTERS)', t:'Closed doors block monsters. Monster will knock a few times then leave — shutter opens automatically.\n\nDOORS DRAIN BATTERY while closed.'},

    {h:'BATTERY', t:'Right-side bar shows battery level. Drained by:\n— each active flashlight\n— each closed door\n— passive drain\n\nBattery DIES: lights go out, doors open, after 5s nearest monster attacks.\n\nCharge only in the day room after surviving a night.'},

    {h:'HOLLOW — RED EYES', t:'From night 3, HOLLOW appears — red eyes visible in darkness. Shows up every 15-30 seconds in a random corridor.\n\nAll other monsters VANISH while HOLLOW is active.\n\nONLY protection: the LEVER on the right wall. Cut power before HOLLOW reaches the end. Flashlight and doors will NOT help.'},

    {h:'LEVER (POWER)', t:'On the right wall (press [D]) is a yellow lever — main power switch.\n\nWhen HOLLOW rushes:\n1. Press [D] to face right\n2. Click lever — power cuts\n3. HOLLOW blinks red eyes and vanishes\n4. Click lever again — power returns\n\nNO lever = death. Power off = no flashlights or doors.'},

    {h:'HANGER (VENT)', t:'From night 4, the Hanger appears in the center corridor. VENT indicator (top left) lights up.\n\nYou have 5-8 seconds to click the BLUE desk button to zap it.\n\n⚠ Zapping when Hanger is NOT there — all monsters speed 4x for 8s!'},

    {h:'DAY ROOM', t:'After surviving: click MONITOR to charge battery, click DOOR for next night, open SHOP to decorate.\n\nBattery does NOT reset between nights!'},

    {h:'SHOP', t:'Buy office decorations with earned dollars: carpet, sofa, posters, plant, board, purple lighting. Cosmetic only.'},

    {h:'MONSTERS', t:'Each night brings different monsters from NIGHTWATCH collection (10 total). Higher nights = faster.\n\nNight 1: 1 monster / Night 2: 2 / Night 3+: 3 + HOLLOW / Night 4+: + HANGER\n\nBrowse monsters in Monster Viewer from main menu.'},

  ];

}

function openHelp() {

  // Pause only if game is actively running

  if (G.running && !G.dead && !G.morning) {

    helpWasRunning = true;

    G.running = false;

  } else {

    helpWasRunning = false;

  }

  var content = buildHelpContent();

  var html = '';

  content.forEach(function(s) {

    html += '<div style="margin-bottom:16px;">' +

      '<div style="color:#ff0;letter-spacing:3px;margin-bottom:4px;font-size:11px;">— ' + s.h + ' —</div>' +

      '<div style="color:#0f0;opacity:.85;">' + s.t.replace(/\n/g,'<br>') + '</div>' +

      '</div>';

  });

  document.getElementById('helpcontent').innerHTML = html;

  document.getElementById('helpoverlay').style.display = 'block';

}

function closeHelp() {

  document.getElementById('helpoverlay').style.display = 'none';

  if (helpWasRunning) { G.running = true; helpWasRunning = false; }

}

</script>
